name: Spatial Apps - TEST Deploy

on:
  push:
      branches-ignore:
      - main

  # Allow manually trigger
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - deploy-to-test

jobs:
  deploy-to-test:
    name: Deploy to Test
    if: github.ref == 'refs/heads/deploy-test' || inputs.job_to_run == 'deploy-to-test'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Generate env.js
        run: |
          mkdir -p ./public
          echo "window.env = { GOOGLE_API_KEY: '${GOOGLE_API_TST_KEY}' };" > ./public/env.js
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_TST_KEY }}

      - name: Deploy to Azure Static Web App (TEST)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_APP_TEST_TOKEN }}
          action: upload
          app_location: apps/
          output_location: ""
